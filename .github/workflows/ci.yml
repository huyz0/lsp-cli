name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      # Advisory, not a gate: the codebase currently carries a handful of
      # pre-existing warnings (zombie-process lints in test helpers, an
      # items-after-test-module style nit) that predate CI and aren't part
      # of this workflow's scope to fix. `-D warnings` would make every PR
      # fail on unrelated pre-existing findings; tighten this once those
      # are cleaned up.
      - run: cargo clippy --all-targets

  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    # Windows is excluded, not an oversight: src/main.rs has a deliberate
    # `compile_error!` gating it out — the background daemon is Unix Domain
    # Socket-only today (see README "No Windows named-pipe support"), so
    # this genuinely does not compile there yet.
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # Per-language integration tests (rust_lang.rs, cpp_lang.rs, etc.) are
      # gated on a real language server being installed and are supposed to
      # skip cleanly when it isn't (see CONTRIBUTING.md) — but GitHub's
      # hosted runner images ship some of these incidentally (rust-analyzer
      # via the default rustup toolchain, clangd via Xcode Command Line
      # Tools on macOS), so the gate sees "installed" and actually runs
      # them against fixtures that were never meant to be CI-validated,
      # producing exactly the kind of not-fully-ready flakiness this
      # session already chased down once — reproduced live: this exact
      # `cargo test --release` failed on ubuntu-latest (rust_lang.rs) and
      # macos-latest (cpp_lang.rs) the first time this workflow ran.
      # Scoped to what CONTRIBUTING.md's own local-setup instructions cover
      # without a real dev environment: unit tests plus the integration
      # binaries with no language-server dependency at all.
      - run: cargo test --release --bin lsp --test help --test install --test locate --test schema --test server --test mcp_stdio
